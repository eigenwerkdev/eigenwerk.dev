<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eigenwerk_ // built because I couldn't not</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@200;300&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      min-height: 100vh;
      overflow: hidden;
      cursor: crosshair;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      mix-blend-mode: difference;
    }

    .logo {
      font-family: 'Space Mono', monospace;
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 700;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: -0.04em;
      position: relative;
      user-select: none;
    }

    .logo-line {
      display: block;
      overflow: hidden;
    }

    .logo-line span {
      display: inline-block;
      animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .logo-line:nth-child(2) span {
      animation-delay: 0.12s;
    }

    @keyframes slideUp {
      from { transform: translateY(120%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .logo::after {
      content: '';
      position: absolute;
      bottom: -0.1em;
      left: 0;
      width: 100%;
      height: 3px;
      background: #fff;
      animation: expandLine 0.8s 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes expandLine {
      from { transform: scaleX(0); transform-origin: left; }
      to { transform: scaleX(1); transform-origin: left; }
    }

    .sub {
      font-family: 'Inter', sans-serif;
      font-weight: 200;
      font-size: clamp(0.75rem, 2vw, 1rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      margin-top: 2rem;
      opacity: 0;
      animation: fadeIn 1s 0.8s ease both;
    }

    @keyframes fadeIn {
      to { opacity: 0.5; }
    }

    .contact {
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.7rem, 1.5vw, 0.85rem);
      color: rgba(255,255,255,0.3);
      text-decoration: none;
      margin-top: 2.5rem;
      letter-spacing: 0.05em;
      opacity: 0;
      animation: fadeIn 1s 1.2s ease both;
      transition: color 0.3s, letter-spacing 0.3s;
    }

    .contact:hover {
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.12em;
    }

    /* glitch on hover */
    .logo:hover .logo-line span {
      animation: glitch 0.3s steps(2) infinite;
    }

    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-3px, 2px); filter: hue-rotate(90deg); }
      40% { transform: translate(3px, -2px); }
      60% { transform: translate(-2px, -1px); filter: hue-rotate(180deg); }
      80% { transform: translate(2px, 1px); }
      100% { transform: translate(0); }
    }

    /* floating symbols */
    .symbols {
      position: fixed;
      z-index: 0;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .sym {
      position: absolute;
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      opacity: 0;
      color: rgba(255,255,255,0.07);
      animation: drift linear infinite;
    }

    @keyframes drift {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.07; }
      90% { opacity: 0.07; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* corner markers */
    .corner {
      position: fixed;
      z-index: 2;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: rgba(255,255,255,0.15);
      letter-spacing: 0.1em;
      mix-blend-mode: difference;
    }
    .corner.tl { top: 1.5rem; left: 1.5rem; }
    .corner.tr { top: 1.5rem; right: 1.5rem; text-align: right; }
    .corner.bl { bottom: 1.5rem; left: 1.5rem; }
    .corner.br { bottom: 1.5rem; right: 1.5rem; text-align: right; }

    .corner span {
      opacity: 0;
      animation: fadeInCorner 0.6s ease both;
    }
    .corner.tl span { animation-delay: 1.2s; }
    .corner.tr span { animation-delay: 1.4s; }
    .corner.bl span { animation-delay: 1.6s; }
    .corner.br span { animation-delay: 1.8s; }

    @keyframes fadeInCorner {
      to { opacity: 1; }
    }

    /* mouse follower ring */
    .ring {
      position: fixed;
      z-index: 999;
      width: 40px;
      height: 40px;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s, border-color 0.3s;
      mix-blend-mode: difference;
    }

    .ring.expand {
      width: 80px;
      height: 80px;
      border-color: rgba(255,255,255,0.6);
    }
  </style>
</head>
<body>

  <canvas id="bg"></canvas>

  <div class="symbols" id="symbols"></div>

  <div class="content">
    <h1 class="logo" id="logo">
      <span class="logo-line"><span>eigen</span></span>
      <span class="logo-line"><span>werk_</span></span>
    </h1>
    <p class="sub">built because I couldn't not</p>
    <a class="contact" href="mailto:e@eigenwerk.dev">e@eigenwerk.dev</a>
  </div>

  <div class="corner tl"><span>37.4529&deg;N</span></div>
  <div class="corner tr"><span>2026</span></div>
  <div class="corner bl"><span>dev/lab</span></div>
  <div class="corner br"><span>v0.3.1</span></div>

  <div class="ring" id="ring"></div>

  <script>
    // === generative particle mesh background ===
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    let w, h, particles = [], mouse = { x: -1000, y: -1000 };

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const PARTICLE_COUNT = 80;
    const CONNECT_DIST = 150;

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push({
        x: Math.random() * w,
        y: Math.random() * h,
        vx: (Math.random() - 0.5) * 0.5,
        vy: (Math.random() - 0.5) * 0.5,
        r: Math.random() * 1.5 + 0.5
      });
    }

    function drawParticles() {
      ctx.clearRect(0, 0, w, h);

      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];

        // mouse repulsion
        const dx = p.x - mouse.x;
        const dy = p.y - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 120) {
          p.vx += dx * 0.0008;
          p.vy += dy * 0.0008;
        }

        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.999;
        p.vy *= 0.999;

        if (p.x < 0) p.x = w;
        if (p.x > w) p.x = 0;
        if (p.y < 0) p.y = h;
        if (p.y > h) p.y = 0;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        ctx.fill();

        // connections
        for (let j = i + 1; j < particles.length; j++) {
          const p2 = particles[j];
          const cdx = p.x - p2.x;
          const cdy = p.y - p2.y;
          const cdist = Math.sqrt(cdx * cdx + cdy * cdy);
          if (cdist < CONNECT_DIST) {
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = `rgba(255,255,255,${0.06 * (1 - cdist / CONNECT_DIST)})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(drawParticles);
    }
    drawParticles();

    // === floating code symbols ===
    const syms = ['{', '}', '//', '=>', '()', '[]', '&&', '||', '!=', '++', '--', '/**/', '0x', 'fn', ';;', '~>', '<>', '::'];
    const symContainer = document.getElementById('symbols');

    function spawnSymbol() {
      const el = document.createElement('div');
      el.className = 'sym';
      el.textContent = syms[Math.floor(Math.random() * syms.length)];
      el.style.left = Math.random() * 100 + '%';
      el.style.animationDuration = (12 + Math.random() * 20) + 's';
      el.style.animationDelay = Math.random() * 2 + 's';
      el.style.fontSize = (0.6 + Math.random() * 1) + 'rem';
      symContainer.appendChild(el);
      setTimeout(() => el.remove(), 35000);
    }

    for (let i = 0; i < 15; i++) setTimeout(spawnSymbol, i * 800);
    setInterval(spawnSymbol, 2000);

    // === custom cursor ring ===
    const ring = document.getElementById('ring');
    const logo = document.getElementById('logo');

    document.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      ring.style.left = e.clientX + 'px';
      ring.style.top = e.clientY + 'px';
    });

    logo.addEventListener('mouseenter', () => ring.classList.add('expand'));
    logo.addEventListener('mouseleave', () => ring.classList.remove('expand'));

    // === scramble effect on logo click ===
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&*';
    const originals = ['eigen', 'werk_'];

    logo.addEventListener('click', () => {
      const spans = logo.querySelectorAll('.logo-line span');
      spans.forEach((span, idx) => {
        const target = originals[idx];
        let iteration = 0;
        const interval = setInterval(() => {
          span.textContent = target
            .split('')
            .map((ch, i) => i < iteration ? target[i] : chars[Math.floor(Math.random() * chars.length)])
            .join('');
          if (iteration >= target.length) clearInterval(interval);
          iteration += 1 / 2;
        }, 40);
      });
    });
  </script>
</body>
</html>
